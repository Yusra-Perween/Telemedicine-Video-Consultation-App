<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Report Summarizer – TeleMed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            color: #fff;
            padding: 40px 20px;
        }
        .container { max-width: 780px; margin: auto; }
        .header { text-align: center; margin-bottom: 36px; }
        .header h1 { font-size: 2.2rem; font-weight: 700; }
        .header h1 span { color: #38bdf8; }
        .header p { color: #a0aec0; margin-top: 8px; }

        .badge {
            display: inline-block;
            background: rgba(56,189,248,0.12);
            border: 1px solid #38bdf8;
            color: #38bdf8;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
        }

        label { display: block; margin-bottom: 8px; font-weight: 600; color: #e2e8f0; }
        textarea {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.07);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.92rem;
            resize: vertical;
            min-height: 180px;
            outline: none;
            transition: border 0.2s;
        }
        textarea:focus { border-color: #38bdf8; }
        textarea::placeholder { color: #718096; }

        .btn-analyze {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #0369a1, #38bdf8);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-analyze:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-analyze:disabled { opacity: 0.6; cursor: not-allowed; }

        .result-box {
            display: none;
            margin-top: 24px;
            background: rgba(56,189,248,0.07);
            border: 1px solid rgba(56,189,248,0.3);
            border-radius: 12px;
            padding: 24px;
            line-height: 1.7;
            white-space: pre-wrap;
            font-size: 0.95rem;
        }
        .result-box.visible { display: block; }

        .spinner { display: none; text-align: center; margin-top: 20px; color: #38bdf8; }
        .spinner.visible { display: block; }

        .disclaimer {
            font-size: 0.78rem;
            color: #f6ad55;
            background: rgba(246,173,85,0.08);
            border: 1px solid rgba(246,173,85,0.25);
            border-radius: 8px;
            padding: 10px 14px;
            margin-top: 16px;
        }
        .nav-link {
            display: inline-block;
            margin-bottom: 24px;
            color: #38bdf8;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .nav-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="nav-link">← Back to Dashboard</a>
        <div class="header">
            <div class="badge">✨ AI Powered</div>
            <h1>AI Medical Report <span>Summarizer</span></h1>
            <p>Paste your medical report below. AI will explain it in simple, plain English.</p>
        </div>

        <div class="card">
            <label for="report">Paste your medical report text</label>
            <textarea id="report" placeholder="e.g. CBC Report: WBC 11.2 x10^3/uL (High), RBC 4.8, HGB 14.2, HCT 42.5%..."></textarea>
            <button class="btn-analyze" id="analyzeBtn" onclick="summarizeReport()">📋 Summarize Report</button>
            <div class="disclaimer">⚠️ This AI summary is for understanding purposes only. Always consult your doctor for medical advice.</div>
        </div>

        <div class="spinner" id="spinner">🤖 AI is reading your report...</div>
        <div class="result-box" id="result"></div>
    </div>

    <script>
        async function summarizeReport() {
            const report = document.getElementById('report').value.trim();
            if (!report) { alert('Please paste your medical report first.'); return; }

            const btn = document.getElementById('analyzeBtn');
            const spinner = document.getElementById('spinner');
            const result = document.getElementById('result');

            btn.disabled = true;
            spinner.classList.add('visible');
            result.classList.remove('visible');

            try {
                const res = await fetch('/api/ai/summarize-report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ report })
                });
                const data = await res.json();
                result.textContent = data.result || data.error;
                result.classList.add('visible');
            } catch (e) {
                result.textContent = '⚠️ Something went wrong. Please try again.';
                result.classList.add('visible');
            }

            btn.disabled = false;
            spinner.classList.remove('visible');
        }
    </script>
</body>
</html>
