<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Appointment</title>

    <link rel="stylesheet" href="/static/book_appointment_style.css" />
  </head>
  <body>
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div style="padding: 15px; margin-bottom: 20px; border: 1px solid transparent; border-radius: 4px;
                      {% if category == 'danger' %}color: #a94442; background-color: #f2dede; border-color: #ebccd1;
                      {% elif category == 'success' %}color: #3c763d; background-color: #dff0d8; border-color: #d6e9c6;
                      {% else %}color: #31708f; background-color: #d9edf7; border-color: #bce8f1;{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <a href="/dashboard" class="btn" style="background-color: #6c757d; margin-bottom: 15px;">&larr; Back to Dashboard</a>
    <h1>Book an Appointment</h1>
      <form method="POST" action="/book_appointment">
        <label for="doctor">Select Doctor:</label>
        <select name="doctor_id" required>
          {% for doctor in doctors %}
          <option value="{{ doctor[0] }}">
            {{ doctor[2] }} ({{ doctor[3] }})
          </option>
          {% endfor %}
        </select>

        <label for="date">Date:</label>
        <input type="date" name="date" required />

        <label for="time">Time:</label>
        <input type="time" name="time" required />

        <div class="pricing">
          <h3>Appointment Fee: $20.00</h3>
        </div>

        <button type="submit">Book Now</button>
      </form>
    </div>
    <script src="/static/script.js"></script>
  </body>
</html>
